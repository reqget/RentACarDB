<!DOCTYPE html>
<html lang="tr">
<head>
    <title>Rent-Car-Arabalar</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">

    <link href="https://fonts.googleapis.com/css?family=Poppins:200,300,400,500,600,700,800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/open-iconic-bootstrap.min.css">
    <link rel="stylesheet" href="css/animate.css">
    <link rel="stylesheet" href="css/owl.carousel.min.css">
    <link rel="stylesheet" href="css/owl.theme.default.min.css">
    <link rel="stylesheet" href="css/magnific-popup.css">
    <link rel="stylesheet" href="css/aos.css">
    <link rel="stylesheet" href="css/ionicons.min.css">
    <link rel="stylesheet" href="css/bootstrap-datepicker.css">
    <link rel="stylesheet" href="css/jquery.timepicker.css">
    <link rel="stylesheet" href="css/flaticon.css">
    <link rel="stylesheet" href="css/icomoon.css">
    <link rel="stylesheet" href="css/style.css">

    <style>
        .car-wrap {
            opacity: 1 !important;
            visibility: visible !important;
        }
    </style>
</head>
<body>

    <div id="navbar"></div>

    <section class="hero-wrap hero-wrap-2 js-fullheight" style="background-image: url('images/bg_3.jpg');" data-stellar-background-ratio="0.5">
        <div class="overlay"></div>
        <div class="container">
            <div class="row no-gutters slider-text js-fullheight align-items-end justify-content-start">
                <div class="col-md-9 ftco-animate pb-5">
                    <p class="breadcrumbs"><span class="mr-2"><a href="index.html">Ana Sayfa <i class="ion-ios-arrow-forward"></i></a></span> <span>Arabalar <i class="ion-ios-arrow-forward"></i></span></p>
                    <h1 class="mb-3 bread">Arabanı Seç</h1>
                </div>
            </div>
        </div>
    </section>

    <section class="ftco-section bg-light">
        <div class="container">
            <div class="row" id="arabaListesi">
                <!-- Arabalar buraya gelecek -->
            </div>
        </div>
    </section>

    <div id="footer"></div>

    <!-- loader -->
    <div id="ftco-loader" class="show fullscreen">
        <svg class="circular" width="48px" height="48px">
            <circle class="path-bg" cx="24" cy="24" r="22" fill="none" stroke-width="4" stroke="#eeeeee" />
            <circle class="path" cx="24" cy="24" r="22" fill="none" stroke-width="4" stroke-miterlimit="10" stroke="#F96D00" />
        </svg>
    </div>

    <!-- Scripts -->
    <script src="js/jquery.min.js"></script>
    <script src="js/jquery-migrate-3.0.1.min.js"></script>
    <script src="js/popper.min.js"></script>
    <script src="js/bootstrap.min.js"></script>
    <script src="js/jquery.easing.1.3.js"></script>
    <script src="js/jquery.waypoints.min.js"></script>
    <script src="js/jquery.stellar.min.js"></script>
    <script src="js/owl.carousel.min.js"></script>
    <script src="js/jquery.magnific-popup.min.js"></script>
    <script src="js/aos.js"></script>
    <script src="js/jquery.animateNumber.min.js"></script>
    <script src="js/bootstrap-datepicker.js"></script>
    <script src="js/jquery.timepicker.min.js"></script>
    <script src="js/scrollax.min.js"></script>
    <script src="https://maps.googleapis.com/maps/api/js?key=YOUR_KEY_HERE&sensor=false"></script>
    <script src="js/google-map.js"></script>
    <script src="js/main.js"></script>

    <script>
        async function loadHTML(id, url, callback) {
            const res = await fetch(url);
            const html = await res.text();
            document.getElementById(id).innerHTML = html;
            if (callback) callback();
        }

        // Navbar ve kullanıcı bilgileri
        loadHTML("navbar", "navbar.html", () => {
            const params = new URLSearchParams(window.location.search);
            const name = params.get("name");
            const id = params.get("id");

            // Debug için konsola yazdıralım
            console.log("URL'den gelen parametreler:", { name, id });

            if (name) {
                console.log("URL'den gelen isim localStorage'a kaydediliyor:", name);
                localStorage.setItem("userName", decodeURIComponent(name));
            }
            if (id) {
                console.log("URL'den gelen ID localStorage'a kaydediliyor:", id);
                localStorage.setItem("userId", id);
            }

            const storedName = localStorage.getItem("userName");
            const storedId = localStorage.getItem("userId");

            console.log("localStorage'dan okunan değerler:", {
                userName: storedName,
                userId: storedId
            });

            if (storedName) {
                const userNameText = document.getElementById("userNameText");
                if (userNameText) {
                    userNameText.textContent = storedName;
                    userNameText.style.color = "black";

                    const userNameNavItem = document.getElementById("userNameNavItem");
                    if (userNameNavItem) userNameNavItem.style.display = "flex";
                }
            }

            // Arabaları getir
            arabalarıGetir();
        });

        // Footer yükle
        loadHTML("footer", "footer.html");

        function kirala(carId) {
            const userId = localStorage.getItem("userId");
            console.log("Kirala fonksiyonu çağrıldı:", {
                carId: carId,
                userId: userId,
                userName: localStorage.getItem("userName"),
                allStorage: { ...localStorage }
            });

            if (!userId || userId === "null" || userId === "undefined") {
                console.log("Kullanıcı girişi bulunamadı, giriş sayfasına yönlendiriliyor");
                alert("Lütfen önce giriş yapınız!");
                window.location.href = "signup.html";
                return;
            }

            console.log("Kiralama sayfasına yönlendiriliyor:", {
                carId: carId,
                userId: userId
            });
            window.location.href = `kiralama-ekle.html?carId=${carId}&userId=${userId}`;
        }

        function arabalarıGetir() {
            fetch("https://localhost:7250/api/Car/List")
                .then(response => response.json())
                .then(data => {
                    const liste = document.getElementById("arabaListesi");

                    if (!liste || data.length === 0) {
                        liste.innerHTML = "<p>Hiç araç bulunamadı.</p>";
                        return;
                    }

                    data.forEach(item => {
                        const arabaHTML = `
                              <div class="col-md-4 mb-4">
                                <div class="car-wrap rounded">
                                  <div class="img rounded d-flex align-items-end" style="background-image: url('https://localhost:7250/uploads/cars/${item.imageName || 'default.jpg'}'); height: 200px; background-size: cover;"></div>
                                  <div class="text p-3">
                                    <h2 class="mb-0"><a href="#">${item.model}</a></h2>
                                    <div class="d-flex mb-3">
                                      <span class="cat">${item.brand}</span>
                                      <p class="price ml-auto">${item.dailyPrice}₺ <span>/günlük</span></p>
                                    </div>
                                    <p class="d-flex mb-0 d-block">
                                      <a href="#" class="btn btn-primary py-2 mr-1" onclick="kirala(${item.carsId})">Kirala</a>
                                     <a href="car-single.html?carId=${item.carsId}" class="btn btn-secondary py-2 ml-1">Detaylar</a>
                                    </p>
                                  </div>
                                </div>
                              </div>
                            `;
                        liste.insertAdjacentHTML("beforeend", arabaHTML);
                    });
                })
                .catch(err => {
                    console.error("Araçlar çekilirken hata:", err);
                });
        }
    </script>
</body>
</html>
